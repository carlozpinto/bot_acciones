name: Resumen diario de acciones

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 8:00 AM Mexico, lunes a domingo
  workflow_dispatch:  # permite correrlo manualmente también

jobs:
  enviar_mensaje:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install yfinance python-telegram-bot python-dotenv requests

      - name: Enviar resumen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ACCIONES_CONFIG: ${{ secrets.ACCIONES_CONFIG }}
        run: python telegram_bot.py
